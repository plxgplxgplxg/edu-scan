version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eduscan-postgres
    restart: always
    env_file:
      - backend-nestjs/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eduscan-redis
    restart: always
    env_file:
      - backend-nestjs/.env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

volumes:
  postgres_data:
  redis_data:
