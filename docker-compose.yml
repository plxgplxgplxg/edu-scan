version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eduscan-postgres
    restart: always
    env_file:
      - backend-nestjs/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eduscan-network

  redis:
    image: redis:7-alpine
    container_name: eduscan-redis
    restart: always
    env_file:
      - backend-nestjs/.env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    networks:
      - eduscan-network

  omr-service:
    build:
      context: ./omr-service
      dockerfile: Dockerfile
    container_name: eduscan-omr-service
    restart: always
    env_file:
      - omr-service/.env
    environment:
      OMR_GRPC_ENABLED: "true"
      OMR_GRPC_HOST: "0.0.0.0"
      OMR_GRPC_PORT: "50051"
      OMR_GRPC_MAX_WORKERS: "4"
      OMR_REQUEST_TIMEOUT_SECONDS: "10"
      OMR_MIN_IMAGE_WIDTH: "300"
      OMR_MIN_IMAGE_HEIGHT: "300"
    ports:
      - "8000:8000"
      - "50051:50051"
    volumes:
      - omr_artifacts:/app/artifacts
    networks:
      - eduscan-network

  backend-nestjs:
    build:
      context: ./backend-nestjs
      dockerfile: Dockerfile
    container_name: eduscan-backend
    restart: always
    env_file:
      - backend-nestjs/.env
    environment:
      OMR_GRPC_URL: "omr-service:50051"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - omr-service
    volumes:
      - omr_artifacts:/app/artifacts
    networks:
      - eduscan-network

volumes:
  omr_artifacts:
  postgres_data:
  redis_data:

networks:
  eduscan-network:
    driver: bridge
